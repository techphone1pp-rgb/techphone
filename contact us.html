<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>تيك فون - اتصل بنا</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            overflow-x: hidden;
            background: linear-gradient(135deg, #614385 0%, #516395 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* شريط التنقل */
        .navbar {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            color: white;
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 32px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        /* قسم اتصل بنا - مبسط */
        .contact-section {
            width: 100%;
            padding: 100px 5% 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeInScale 1s ease;
            backdrop-filter: blur(10px);
        }

        .contact-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .contact-header h1 {
            font-size: 48px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .contact-header p {
            font-size: 18px;
            opacity: 0.9;
        }

        /* نموذج الاتصال - مبسط */
        .contact-form {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #555;
        }

        .form-group label i {
            margin-left: 8px;
            color: #1e3c72;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            right: 20px;
            color: #999;
            font-size: 18px;
            z-index: 1;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .input-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 4px rgba(30, 60, 114, 0.1);
        }

        /* زر الإرسال */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(30, 60, 114, 0.4);
        }

        .submit-btn i {
            font-size: 20px;
        }

        /* رسالة نجاح */
        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: #d4edda;
            color: #155724;
            border-radius: 15px;
            margin-top: 20px;
            animation: fadeInUp 0.5s ease;
        }

        .success-message i {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }

        .success-message.show {
            display: block;
        }

        /* Animations */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .contact-header h1 {
                font-size: 36px;
            }
            
            .contact-form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- شريط التنقل -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="contact us.html" class="logo">
                <i class="fas fa-mobile-alt"></i>
                تيك فون
            </a>
            <div class="nav-links">
                <a href="deepseek.html">الرئيسية</a>
                <a href="css.html">الهواتف</a>
                <a href="css.html">المقارنة</a>
                <a href="contact us.html" class="active">اتصل بنا</a>
            </div>
        </div>
    </nav>

    <!-- قسم اتصل بنا - مبسط -->
    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-header">
                <h1>اتصل بنا</h1>
                <p>نحن هنا للإجابة على استفساراتك</p>
            </div>
            
            <!-- نموذج الاتصال - فقط 4 حقول -->
            <div class="contact-form">
                <!-- مهم: استبدل البريد الإلكتروني هنا ببريدك الخاص -->
                <form action="https://techphone1pp@gmail.com" method="POST" id="contactForm">
                    <!-- حقول مخفية لتكوين البريد -->
                    <input type="hidden" name="_subject" value="رسالة جديدة من موقع تيك فون">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_language" value="ar">
                    
                    <!-- الاسم -->
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> الاسم الكامل</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" name="الاسم" placeholder="أدخل اسمك" required>
                        </div>
                    </div>
                    
                    <!-- البريد الإلكتروني -->
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" name="البريد_الإلكتروني" placeholder="example@domain.com" required>
                        </div>
                    </div>
                    
                    <!-- نوع الاستفسار -->
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> نوع الاستفسار</label>
                        <div class="input-group">
                            <i class="fas fa-chevron-down"></i>
                            <select name="نوع_الاستفسار" required>
                                <option value="">اختر نوع الاستفسار</option>
                                <option value="استفسار عن منتج">استفسار عن منتج</option>
                                <option value="دعم فني">دعم فني</option>
                                <option value="شكوى">شكوى</option>
                                <option value="اقتراح">اقتراح</option>
                                <option value="وظائف">وظائف</option>
                                <option value="أخرى">أخرى</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- الرسالة -->
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> الرسالة</label>
                        <div class="input-group">
                            <i class="fas fa-comment" style="top: 25px; transform: none;"></i>
                            <textarea name="الرسالة" placeholder="اكتب رسالتك هنا..." required></textarea>
                        </div>
                    </div>
                    
                    <!-- زر الإرسال -->
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i>
                        إرسال الرسالة
                    </button>
                    
                    <!-- رسالة النجاح -->
                    <div class="success-message" id="successMessage">
                        <i class="fas fa-check-circle"></i>
                        <h3>تم إرسال رسالتك بنجاح!</h3>
                        <p>شكراً لتواصلك معنا - سنرد عليك في أقرب وقت ممكن</p>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer بسيط -->
    <footer style="background: #1e3c72; color: white; text-align: center; padding: 15px; font-size: 14px; position: fixed; bottom: 0; width: 100%;">
        <p>© 2026 تيك فون - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        // تفعيل نموذج الإرسال
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            // منع الإرسال الفوري لعرض رسالة النجاح
            e.preventDefault();
            
            // عرض رسالة النجاح
            const successMessage = document.getElementById('successMessage');
            successMessage.classList.add('show');
            
            // إعادة تعيين النموذج
            this.reset();
            
            // إرسال النموذج بعد 2 ثانية
            setTimeout(() => {
                // هنا يتم إرسال النموذج فعلياً
                this.submit();
            }, 2000);
        });

        // تحريك سلس للأقسام
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
