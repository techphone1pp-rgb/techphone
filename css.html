    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Navigation Bar */
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto; 
            padding: 0 20px;
        }

        .logo {
            color: white;
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 32px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 20px 40px;
        }

        h1 {
            color: white;
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: fadeInDown 1s ease;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            font-size: 18px;
            margin-bottom: 50px;
        }

        /* Selection Area */
        .selection-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .phone-select {
            flex: 1;
            max-width: 400px;
            min-width: 280px;
        }

        .select-label {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
            display: block;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            pointer-events: none;
        }

        select {
            width: 100%;
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #333;
            cursor: pointer;
            appearance: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        select:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .vs-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        .compare-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: block;
            margin: 0 auto 50px;
        }

        .compare-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
        }

        /* Comparison Table */
        .comparison-container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-top: 50px;
            display: block; /* Changed from none to block */
        }

        .comparison-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .comparison-header h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
        }

        .comparison-table tr {
            border-bottom: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .comparison-table tr:hover {
            background: #f8f9fa;
        }

        .comparison-table td {
            padding: 20px 30px;
            font-size: 18px;
        }

        .comparison-table td:first-child {
            font-weight: 600;
            color: #667eea;
            width: 200px;
            background: #f8f9fa;
        }

        .comparison-table td:not(:first-child) {
            text-align: center;
            width: 250px;
        }

        .phone-name-header {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            font-size: 20px;
        }

        .winner-badge {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }

        .spec-icon {
            font-size: 20px;
            margin-right: 10px;
            width: 30px;
            display: inline-block;
            text-align: center;
        }

        /* Initial message */
        .initial-message {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .initial-message i {
            font-size: 64px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .initial-message p {
            font-size: 18px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>

            }
            
            // التحقق من وجود البيانات
            if (!phones[phone1Value] || !phones[phone2Value]) {
                alert('❌ عذراً، بيانات الهاتف غير متوفرة');
                return;
            }
            
            // جلب بيانات الهاتفين
            const phone1 = phones[phone1Value];
            const phone2 = phones[phone2Value];
            
            // عرض المقارنة
            displayComparison(phone1, phone2);
        }

        // دالة عرض المقارنة في الجدول
        function displayComparison(phone1, phone2) {
            // إخفاء الرسالة الافتراضية
            document.getElementById('initialMessage').style.display = 'none';
            
            // إظهار جدول المقارنة
            const table = document.getElementById('comparisonTable');
            table.style.display = 'table';
            
            // قائمة المواصفات
            const specs = [
                { key: 'battery', name: 'البطارية', icon: 'fa-battery-full', color: '#4caf50' },
                { key: 'screen', name: 'الشاشة', icon: 'fa-tv', color: '#2196f3' },
                { key: 'processor', name: 'المعالج', icon: 'fa-microchip', color: '#ff9800' },
                { key: 'camera', name: 'الكاميرا الخلفية', icon: 'fa-camera', color: '#e91e63' },
                { key: 'ram', name: 'الذاكرة العشوائية', icon: 'fa-memory', color: '#9c27b0' },
                { key: 'storage', name: 'مساحة التخزين', icon: 'fa-database', color: '#ff5722' },
                { key: 'os', name: 'نظام التشغيل', icon: 'fa-code', color: '#607d8b' },
                { key: 'weight', name: 'الوزن', icon: 'fa-weight-hanging', color: '#795548' }
            ];
            
            // بناء HTML الجدول
            let html = '';
            
            // صف أسماء الهواتف
            html += `<tr class="phone-name-header">
                <td><i class="fas fa-info-circle" style="color: #667eea;"></i> الهاتف</td>
                <td><strong>${phone1.name}</strong></td>
                <td><strong>${phone2.name}</strong></td>
            </tr>`;
            
            // صفوف المواصفات
            specs.forEach(spec => {
                html += `<tr>
                    <td>
                        <i class="fas ${spec.icon} spec-icon" style="color: ${spec.color};"></i>
                        ${spec.name}
                    </td>
                    <td>${phone1[spec.key]}</td>
                    <td>${phone2[spec.key]}</td>
                </tr>`;
            });
            
            // إضافة الجدول للصفحة
            table.innerHTML = html;
            
            // تمرير سلس لنتيجة المقارنة
            document.getElementById('comparisonResult').scrollIntoView({ 
                behavior: 'smooth',
                block: 'start'
            });
            
            // رسالة تأكيد
            console.log('✅ تمت المقارنة بنجاح');
        }

        // عند تحميل الصفحة
        window.onload = function() {
            console.log('✅ صفحة المقارنة جاهزة');
        };
    </script>
